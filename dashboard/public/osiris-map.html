<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#020408;overflow:hidden}
#map{position:absolute;inset:0}

/* ── Dark Leaflet overrides ─────────────────────────────────────────── */
.leaflet-control-zoom a{background:#0a0e1c!important;color:#7c3aed!important;border-color:#1e2540!important;font-weight:700}
.leaflet-control-zoom a:hover{background:#12172e!important;color:#c084fc!important}
.leaflet-bar{border:1px solid #1e2540!important;border-radius:8px!important;overflow:hidden;box-shadow:0 0 20px rgba(124,58,237,.15)!important}
.leaflet-control-attribution{background:rgba(2,4,8,.75)!important;color:#252840!important;font-size:9px!important;font-family:monospace}
.leaflet-control-attribution a{color:#3d3070!important}
.leaflet-popup-content-wrapper{background:#050918!important;border:1px solid rgba(192,132,252,.35)!important;border-radius:10px!important;box-shadow:0 0 40px rgba(124,58,237,.35),0 0 80px rgba(124,58,237,.1)!important;color:#e4e6f0!important;font-family:monospace!important}
.leaflet-popup-tip{background:#050918!important}
.leaflet-popup-close-button{color:#3d3070!important;font-size:18px!important;top:8px!important;right:10px!important}
.leaflet-popup-close-button:hover{color:#c084fc!important;background:none!important}
.leaflet-popup-content{margin:14px 16px!important}

/* ── Cluster icon overrides ─────────────────────────────────────────── */
.osiris-cluster-wrap{display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:monospace;font-weight:700;cursor:pointer}
.marker-cluster-small .osiris-cluster-wrap{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.5);color:#c084fc;box-shadow:0 0 10px rgba(124,58,237,.25)}
.marker-cluster-medium .osiris-cluster-wrap{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.5);color:#d8b4fe;box-shadow:0 0 14px rgba(168,85,247,.3)}
.marker-cluster-large .osiris-cluster-wrap{background:rgba(0,243,255,.08);border:1px solid rgba(0,243,255,.4);color:#00f3ff;box-shadow:0 0 20px rgba(0,243,255,.25)}

/* ── Layer widget ─────────────────────────────────────────────────────── */
#layer-widget{position:absolute;top:14px;right:14px;z-index:1000;
  background:rgba(3,5,16,.88);border:1px solid rgba(124,58,237,.3);
  border-radius:10px;padding:12px;backdrop-filter:blur(16px);
  font-family:monospace;min-width:168px;
  box-shadow:0 0 40px rgba(124,58,237,.1),0 4px 24px rgba(0,0,0,.6)}
.w-title{font-size:9px;font-weight:700;color:#3a3060;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(124,58,237,.15);
  display:flex;align-items:center;gap:6px}
.w-dot{width:6px;height:6px;border-radius:50%;background:#7c3aed;
  box-shadow:0 0 8px #7c3aed;animation:wdot 2s ease-in-out infinite}
@keyframes wdot{0%,100%{opacity:1}50%{opacity:.25}}
.layer-btn{width:100%;text-align:left;padding:7px 10px;border-radius:6px;margin-bottom:3px;
  background:transparent;border:1px solid transparent;color:#3a3060;
  font-size:11px;font-weight:600;cursor:pointer;font-family:monospace;
  display:flex;align-items:center;gap:8px;transition:all .14s;letter-spacing:.04em}
.layer-btn:last-of-type{margin-bottom:0}
.layer-btn.active{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.35);color:#c084fc}
.layer-btn:hover:not(.active){background:rgba(255,255,255,.03);color:#6060a0}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#layer-info{margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.04);
  font-size:9px;color:#2e2a50;letter-spacing:.06em;line-height:1.6}

/* ── Scanline overlay ─────────────────────────────────────────────────── */
#scanline{position:absolute;inset:0;z-index:500;pointer-events:none;overflow:hidden}
#scanline::after{content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(to bottom,transparent,rgba(124,58,237,.08),transparent);
  animation:scan 8s linear infinite}
@keyframes scan{0%{top:-2px}100%{top:100%}}

/* ── Choropleth tooltip ───────────────────────────────────────────────── */
.choro-tip{font-family:monospace;font-size:11px;background:rgba(3,5,16,.95);
  border:1px solid rgba(192,132,252,.3);border-radius:6px;padding:7px 11px;
  color:#c084fc;white-space:nowrap;box-shadow:0 0 16px rgba(124,58,237,.2)}
.choro-tip strong{color:#00f3ff}

/* ── Loading spinner ─────────────────────────────────────────────────── */
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:900;font-family:monospace;font-size:12px;color:#7c3aed;letter-spacing:.12em;
  display:none}
#loading.visible{display:block}
</style>
</head>
<body>
<div id="scanline"></div>
<div id="map"></div>
<div id="loading">LOADING DATA…</div>

<!-- Layer widget (radar-style) -->
<div id="layer-widget">
  <div class="w-title"><span class="w-dot"></span>LAYER CONTROL</div>
  <button class="layer-btn active" data-layer="heat" onclick="setLayer('heat')">
    <span class="ldot" style="background:#e040fb;box-shadow:0 0 7px #e040fb80"></span>HEATMAP
  </button>
  <button class="layer-btn" data-layer="cluster" onclick="setLayer('cluster')">
    <span class="ldot" style="background:#00f3ff;box-shadow:0 0 7px #00f3ff80"></span>CLUSTERS
  </button>
  <button class="layer-btn" data-layer="choropleth" onclick="setLayer('choropleth')">
    <span class="ldot" style="background:#7c3aed;box-shadow:0 0 7px #7c3aed80"></span>CHOROPLETH
  </button>
  <div id="layer-info">INIT…</div>
</div>

<script>
// ── Map init ──────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [34.05, -118.25], zoom: 11,
  zoomControl: true, attributionControl: true, preferCanvas: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────────
let _activeLayer  = null;
let _cachedLayers = {};
let _pointsData   = null;
let _geoData      = null;
let _maxCrimes    = 0;
let _filters      = { area: null, part: 'all' };

function loading(on) {
  document.getElementById('loading').classList.toggle('visible', on);
}

function setInfo(txt) {
  document.getElementById('layer-info').textContent = txt;
}

// ── Data loaders ──────────────────────────────────────────────────────────
async function loadPoints() {
  if (_pointsData) return _pointsData;
  loading(true);
  const r = await fetch('/data/crime_points_hourly.json');
  _pointsData = await r.json();
  loading(false);
  return _pointsData;
}

async function loadGeo() {
  if (_geoData) return _geoData;
  loading(true);
  const r = await fetch('/data/lapd_divisions_crimes.geojson');
  _geoData = await r.json();
  _maxCrimes = Math.max(..._geoData.features.map(f => f.properties.total_crimes || 0));
  loading(false);
  return _geoData;
}

// ── Heatmap layer (cyberpunk gradient) ────────────────────────────────────
async function buildHeat() {
  const d = await loadPoints();
  const pts = [];
  const maxCount = Math.max(...d.counts);
  d.hours.forEach((hourPts, h) => {
    const intensity = d.counts[h] / maxCount;
    // Every 2nd point — ~60k total, performant
    for (let i = 0; i < hourPts.length; i += 2) {
      const [lat, lng] = hourPts[i];
      if (lat === 0 && lng === 0) continue;
      pts.push([lat, lng, intensity]);
    }
  });
  const layer = L.heatLayer(pts, {
    radius: 20, blur: 24, maxZoom: 16, max: 1.0,
    gradient: { 0.0:'#0d0a1f', 0.2:'#3b0764', 0.4:'#7c3aed', 0.6:'#a855f7', 0.8:'#e040fb', 1.0:'#00f3ff' },
  });
  setInfo(`PTS: ${pts.length.toLocaleString()} · ALL HRS`);
  return layer;
}

// ── Cluster layer ─────────────────────────────────────────────────────────
async function buildCluster() {
  const d = await loadPoints();
  const clusters = L.markerClusterGroup({
    maxClusterRadius: 60,
    iconCreateFunction: (c) => {
      const n = c.getChildCount();
      const sz = n > 500 ? 46 : n > 100 ? 36 : 28;
      const cls = n > 500 ? 'large' : n > 100 ? 'medium' : 'small';
      const label = n > 999 ? (n/1000).toFixed(1)+'k' : n;
      return L.divIcon({
        html: `<div class="marker-cluster-${cls}"><div class="osiris-cluster-wrap" style="width:${sz}px;height:${sz}px;font-size:${sz>36?13:11}px">${label}</div></div>`,
        className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2],
      });
    },
    spiderfyOnMaxZoom: true, showCoverageOnHover: false,
    zoomToBoundsOnClick: true, disableClusteringAtZoom: 16,
    animate: true, animateAddingMarkers: false,
  });

  let total = 0;
  d.hours.forEach((hourPts, h) => {
    for (let i = 0; i < hourPts.length; i += 5) {
      const [lat, lng] = hourPts[i];
      if (lat === 0 && lng === 0) continue;
      const m = L.circleMarker([lat, lng], {
        radius: 4, fillColor: '#c084fc', color: 'transparent',
        fillOpacity: 0.75, weight: 0,
      });
      m.bindPopup(`<div style="color:#c084fc;font-size:11px;line-height:1.6">
        <div style="font-weight:700;color:#e040fb;margin-bottom:4px">◈ INCIDENT LOG</div>
        <div>HOUR: <span style="color:#00f3ff">${String(h).padStart(2,'0')}:XX</span></div>
        <div style="margin-top:6px;font-size:9px;color:#3d3070">
          LAT: ${lat.toFixed(4)} &nbsp; LNG: ${lng.toFixed(4)}
        </div>
      </div>`);
      clusters.addLayer(m);
      total++;
    }
  });
  setInfo(`MKRS: ${total.toLocaleString()} · CLUSTERED`);
  return clusters;
}

// ── Choropleth layer ──────────────────────────────────────────────────────
function choroFill(crimes) {
  const t = crimes / _maxCrimes;
  if (t > 0.80) return '#e040fb';
  if (t > 0.60) return '#a855f7';
  if (t > 0.40) return '#7c3aed';
  if (t > 0.20) return '#5b21b6';
  return '#3b0764';
}

function choroStyle(feature, highlighted) {
  const crimes = feature.properties.total_crimes || 0;
  if (highlighted) return {
    fillColor: '#00f3ff', fillOpacity: 0.55,
    color: '#00f3ff', weight: 2, opacity: 0.9,
  };
  return {
    fillColor: choroFill(crimes),
    fillOpacity: 0.3 + (crimes / _maxCrimes) * 0.45,
    color: '#c084fc', weight: 1, opacity: 0.5,
  };
}

async function buildChoropleth() {
  const geo = await loadGeo();
  let _hovered = null;

  const layer = L.geoJSON(geo, {
    style: (f) => choroStyle(f, false),
    onEachFeature: (feature, lyr) => {
      const p = feature.properties;
      const name = p.name || 'UNKNOWN';

      lyr.on('mouseover', function(e) {
        if (_hovered && _hovered !== this) _hovered.setStyle(choroStyle(_hovered.feature, false));
        this.setStyle({ fillOpacity: 0.8, weight: 2, color: '#00f3ff', fillColor: '#00f3ff' });
        this.bringToFront();
        _hovered = this;
        L.popup({ closeButton: false, offset: [0, -2], className: '' })
          .setLatLng(e.latlng)
          .setContent(`<div class="choro-tip">
            ▸ <strong>${name}</strong><br>
            INCIDENTS: <strong>${(p.total_crimes||0).toLocaleString()}</strong><br>
            CLR RATE: <strong>${(p.clearance||0).toFixed(1)}%</strong><br>
            TOP: <strong>${p.top_category||'—'}</strong>
          </div>`)
          .openOn(map);
      });
      lyr.on('mouseout', function() {
        const isSelected = _filters.area &&
          (_filters.area.toUpperCase() === name.toUpperCase());
        this.setStyle(choroStyle(feature, isSelected));
        map.closePopup();
      });
      lyr.on('click', function() {
        // Send area click to parent React page
        window.parent.postMessage({ type: 'OSIRIS_AREA_CLICK', area: name }, '*');
      });
    },
  });

  setInfo('DIVS: 21 · CLICK TO FILTER');
  return layer;
}

// ── Layer switcher ────────────────────────────────────────────────────────
async function setLayer(name) {
  // Remove active layer
  Object.values(_cachedLayers).forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });

  // Update button state
  document.querySelectorAll('.layer-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === name);
  });

  _activeLayer = name;
  setInfo('LOADING…');

  // Build or reuse from cache
  if (!_cachedLayers[name]) {
    if (name === 'heat')       _cachedLayers[name] = await buildHeat();
    else if (name === 'cluster')    _cachedLayers[name] = await buildCluster();
    else if (name === 'choropleth') _cachedLayers[name] = await buildChoropleth();
  }

  _cachedLayers[name].addTo(map);

  // If area filter active + choropleth: re-highlight
  if (name === 'choropleth' && _filters.area) applyAreaHighlight(_filters.area);
}

// ── Area highlight (choropleth) ───────────────────────────────────────────
function applyAreaHighlight(area) {
  if (!_cachedLayers['choropleth']) return;
  _cachedLayers['choropleth'].eachLayer(lyr => {
    const name = lyr.feature?.properties?.name || '';
    const isMatch = area && name.toUpperCase() === area.toUpperCase();
    lyr.setStyle(choroStyle(lyr.feature, isMatch));
    if (isMatch) {
      lyr.bringToFront();
      map.fitBounds(lyr.getBounds(), { padding: [60, 60] });
    }
  });
}

// ── postMessage API ───────────────────────────────────────────────────────
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'OSIRIS_FILTER') return;
  _filters = { ...e.data };

  // Highlight selected area in choropleth
  if (_activeLayer === 'choropleth') applyAreaHighlight(_filters.area || '');

  // Zoom to selected area (any layer)
  if (_filters.area && _cachedLayers['choropleth']) {
    _cachedLayers['choropleth'].eachLayer(lyr => {
      const name = lyr.feature?.properties?.name || '';
      if (name.toUpperCase() === (_filters.area || '').toUpperCase()) {
        map.fitBounds(lyr.getBounds(), { padding: [80, 80] });
      }
    });
  } else if (!_filters.area) {
    map.setView([34.05, -118.25], 11);
  }
});

// ── Bootstrap ─────────────────────────────────────────────────────────────
setLayer('heat');
</script>
</body>
</html>
