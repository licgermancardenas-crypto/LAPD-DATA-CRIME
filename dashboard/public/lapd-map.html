<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<style>
  :root {
    --bg:#0a0c12; --surface:rgba(10,12,18,.92); --surface-s:#1a1d27;
    --border:#2a2d3a; --text:#e8eaf0; --muted:#7b82a0;
    --popup-bg:rgba(10,12,18,.97); --outline:#0a0c12;
  }
  .lm {
    --bg:#eef0f4; --surface:rgba(255,255,255,.95); --surface-s:#ffffff;
    --border:#d4d8e2; --text:#1a1d27; --muted:#6b7280;
    --popup-bg:rgba(255,255,255,.98); --outline:#c8ccd6;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);transition:background .25s}
  #map{position:absolute;top:0;left:0;right:0;bottom:0}

  /* ── Leaflet overrides ── */
  .leaflet-control-zoom a{background:var(--surface-s)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-bar{border:1px solid var(--border)!important;border-radius:8px!important;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.2)!important}
  .leaflet-control-attribution{background:var(--surface)!important;color:var(--muted)!important;font-size:10px!important}
  .leaflet-control-attribution a{color:#4f8ef7!important}
  .leaflet-popup-content-wrapper{background:var(--popup-bg)!important;border:1px solid var(--border)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.25)!important;color:var(--text)!important}
  .leaflet-popup-tip{background:var(--popup-bg)!important}
  .leaflet-popup-close-button{color:var(--muted)!important;font-size:18px!important;padding:6px 8px!important}
  .leaflet-popup-close-button:hover{color:var(--text)!important;background:none!important}
  .leaflet-popup-content{margin:14px 16px!important;min-width:210px}

  /* ── Popup card ── */
  .div-name{font-weight:700;font-size:15px;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .div-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .div-rank{display:inline-flex;align-items:center;gap:4px;background:var(--surface-s);border:1px solid var(--border);border-radius:6px;padding:3px 10px;margin-bottom:10px;font-size:11px;color:var(--muted)}
  .div-rank .rn{color:#e0883a;font-weight:700}
  .stat-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:7px}
  .stat-label{font-size:11px;color:var(--muted)}
  .stat-val{font-size:13px;font-weight:600}
  .stat-sep{height:1px;background:var(--border);margin:6px 0}
  .mini-bar-bg{height:4px;border-radius:2px;background:var(--surface-s);overflow:hidden;margin-top:10px}
  .mini-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

  /* ── Metric toolbar (top-left) ── */
  #toolbar{position:fixed;top:12px;left:12px;z-index:1000;display:flex;gap:4px}
  .mb{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;
      border:1px solid var(--border);background:var(--surface-s);color:var(--muted);
      transition:all .15s;letter-spacing:.03em;white-space:nowrap}
  .mb.on{background:#4f8ef7;border-color:#4f8ef7;color:#fff}
  .mb:hover:not(.on){color:var(--text)}

  /* ── Top-right controls ── */
  #top-right{position:fixed;top:12px;right:12px;z-index:1000;display:flex;gap:6px;align-items:center}
  #tt,#nb-btn{height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface-s);
      color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .15s}
  #tt{width:34px;font-size:15px}
  #tt:hover,#nb-btn:hover{opacity:.8}
  #nb-btn{padding:0 11px;font-size:11px;font-weight:600;color:var(--muted);gap:6px;white-space:nowrap}
  #nb-btn.on{background:rgba(79,142,247,.12);border-color:rgba(79,142,247,.45);color:#4f8ef7}

  /* ── Legend (bottom-right) ── */
  #legend{position:fixed;bottom:36px;right:52px;background:var(--surface);
          border:1px solid var(--border);border-radius:8px;padding:9px 12px;z-index:1000}
  #legend p{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin-bottom:5px}
  #leg-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;width:120px}
  #leg-labs{display:flex;justify-content:space-between;margin-top:3px}
  #leg-labs span{font-size:9px;color:var(--muted)}

  /* ── Hint (bottom-left) ── */
  #hint{position:fixed;bottom:36px;left:12px;background:var(--surface);
        border:1px solid var(--border);border-radius:6px;padding:5px 11px;
        font-size:11px;color:var(--muted);z-index:1000}

  /* ── Hour animation controls (bottom-center) ── */
  #hour-ctrl{
    position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
    z-index:1000;display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:11px;padding:9px 14px;
    box-shadow:0 4px 20px rgba(0,0,0,.35);white-space:nowrap;
  }
  #play-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
    background:var(--surface-s);color:var(--text);cursor:pointer;
    font-size:13px;display:flex;align-items:center;justify-content:center;
    transition:all .12s;flex-shrink:0;
  }
  #play-btn:hover:not(:disabled){border-color:#4f8ef7;color:#4f8ef7}
  #play-btn:disabled{opacity:.35;cursor:default}
  #play-btn.playing{background:#4f8ef7;border-color:#4f8ef7;color:#fff}
  #hc-track{display:flex;flex-direction:column;gap:4px;align-items:stretch}
  #hc-spark{display:flex;gap:1.5px;align-items:flex-end;height:18px;width:216px}
  .hc-bar{flex:1;border-radius:2px 2px 0 0;background:rgba(79,142,247,.18);
          transition:background .12s,height .12s}
  .hc-bar.hc-act{background:#4f8ef7}
  #hour-slider{
    width:216px;height:3px;appearance:none;-webkit-appearance:none;
    background:var(--border);border-radius:2px;cursor:pointer;outline:none;
  }
  #hour-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
    background:#4f8ef7;cursor:pointer;border:2px solid #fff;
    box-shadow:0 0 0 2px rgba(79,142,247,.4);
  }
  #hour-slider::-moz-range-thumb{
    width:13px;height:13px;border-radius:50%;
    background:#4f8ef7;cursor:pointer;border:2px solid #fff;box-shadow:none;
  }
  #hour-slider:disabled{opacity:.3;cursor:default}
  #hc-label{
    font-size:12px;font-weight:700;color:var(--text);
    min-width:66px;text-align:center;line-height:1.2;
  }
  #hc-label small{display:block;font-size:9px;color:var(--muted);font-weight:400;margin-top:2px}
  #hour-reset{
    width:22px;height:22px;border-radius:5px;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;font-size:11px;
    display:none;align-items:center;justify-content:center;flex-shrink:0;
    transition:all .12s;
  }
  #hour-reset:hover{border-color:#e05252;color:#e05252}

  /* ── Division name labels ── */
  .leaflet-tooltip.div-lab{
    background:transparent!important;border:none!important;box-shadow:none!important;
    color:#ffffff;font-size:10px;font-weight:700;letter-spacing:.05em;text-align:center;
    text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.8);
    pointer-events:none!important;white-space:nowrap;padding:0!important;line-height:1.3
  }
  .lm .leaflet-tooltip.div-lab{
    color:#0f1117;text-shadow:0 1px 3px rgba(255,255,255,.9),0 0 8px rgba(255,255,255,.6)
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="toolbar">
  <button class="mb on" data-m="crimes">Total Crimes</button>
  <button class="mb"    data-m="clearance">Clearance Rate</button>
</div>

<div id="top-right">
  <button id="nb-btn" title="Toggle neighborhood boundaries">
    <span>⬡</span> Neighborhoods
  </button>
  <button id="tt" title="Toggle dark / light mode">🌙</button>
</div>

<div id="legend">
  <p id="leg-title">CRIME VOLUME 2020-24</p>
  <div id="leg-bar"></div>
  <div id="leg-labs"><span id="leg-lo">Low</span><span id="leg-hi">High</span></div>
</div>

<div id="hint">Click a division to explore</div>

<div id="hour-ctrl">
  <button id="play-btn" title="Play 24h animation" disabled>▶</button>
  <div id="hc-track">
    <div id="hc-spark"></div>
    <input type="range" id="hour-slider" min="0" max="23" step="1" value="6" disabled>
  </div>
  <div id="hc-label">All Hours<small>Loading…</small></div>
  <button id="hour-reset" title="Reset to all hours">✕</button>
</div>

<script>
// ── Color stops ────────────────────────────────────────────────────────────
var S_CRIMES = [[13,33,55],[26,74,138],[79,142,247],[224,136,58],[224,82,82]];
var S_CLR    = [[224,82,82],[224,136,58],[224,192,102],[79,207,142],[40,160,100]];

function lerp(t, stops) {
  t = Math.max(0, Math.min(1, t));
  var n = stops.length - 1, s = t*n, i = Math.min(Math.floor(s), n-1), f = s-i;
  var a = stops[i], b = stops[i+1]||stops[n];
  return 'rgb('+Math.round(a[0]+f*(b[0]-a[0]))+','+Math.round(a[1]+f*(b[1]-a[1]))+','+Math.round(a[2]+f*(b[2]-a[2]))+')';
}

// ── State ──────────────────────────────────────────────────────────────────
var dark = true, metric = 'crimes', geoLayer;

// Hour animation state
var hourFractions = null;   // array[24] of fractions summing to 1
var maxHourFrac   = 1;
var currentHour   = null;   // null = all-day view, 0-23 = specific hour
var isPlaying     = false;
var playInterval  = null;

// ── Legend ─────────────────────────────────────────────────────────────────
function buildLegend() {
  var stops = metric === 'crimes' ? S_CRIMES : S_CLR;
  var bar = document.getElementById('leg-bar');
  bar.innerHTML = '';
  for (var k=0; k<24; k++) {
    var d = document.createElement('div');
    d.style.flex = '1';
    d.style.background = lerp(k/23, stops);
    bar.appendChild(d);
  }
  document.getElementById('leg-title').textContent =
    metric === 'crimes' ? 'CRIME VOLUME 2020-24' : 'CLEARANCE RATE 2020-24';
  document.getElementById('leg-lo').textContent = metric === 'crimes' ? 'Low'   : 'Low %';
  document.getElementById('leg-hi').textContent = metric === 'crimes' ? 'High'  : 'High %';
}
buildLegend();

// ── Map ────────────────────────────────────────────────────────────────────
var map = L.map('map',{center:[34.045,-118.28],zoom:10,zoomControl:false,attributionControl:true});
setTimeout(function(){ map.invalidateSize(); }, 100);
L.control.zoom({position:'bottomright'}).addTo(map);

var tOpts = {subdomains:'abcd',maxZoom:19,
  attribution:'<a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>'};
var tDark  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', tOpts);
var tLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', tOpts);
tDark.addTo(map);

// ── Theme toggle ───────────────────────────────────────────────────────────
document.getElementById('tt').addEventListener('click', function() {
  dark = !dark;
  document.body.classList.toggle('lm', !dark);
  this.textContent = dark ? '🌙' : '☀️';
  if (dark) { map.removeLayer(tLight); tDark.addTo(map); }
  else      { map.removeLayer(tDark);  tLight.addTo(map); }
  refreshStyle();
});

// ── Metric buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.mb').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mb').forEach(function(b){ b.classList.remove('on'); });
    this.classList.add('on');
    metric = this.dataset.m;
    refreshStyle();
    buildLegend();
  });
});

// ── Layer style ─────────────────────────────────────────────────────────────
function featureStyle(f) {
  var p = f.properties;
  var stops, t;
  if (metric === 'clearance') {
    t = p._clrNorm;
    stops = S_CLR;
  } else {
    t = p.norm;
    // Modulate brightness by time-of-day fraction (all divisions scale together)
    if (currentHour !== null && hourFractions) {
      t = t * (hourFractions[currentHour] / maxHourFrac);
    }
    stops = S_CRIMES;
  }
  return {
    fillColor:   lerp(t, stops),
    fillOpacity: currentHour !== null && metric === 'crimes' ? 0.78 : 0.65,
    color:       dark ? '#0a0c12' : '#c8ccd6',
    weight: 1.8, opacity: 0.9
  };
}

function refreshStyle() {
  if (geoLayer) geoLayer.setStyle(featureStyle);
}

// ── Load GeoJSON ───────────────────────────────────────────────────────────
fetch('/data/lapd_divisions_crimes.geojson')
  .then(function(r){ return r.json(); })
  .then(function(gj) {
    gj.features.sort(function(a,b){ return b.properties.total_crimes - a.properties.total_crimes; });
    gj.features.forEach(function(f,i){ f.properties.rank = i+1; });

    // Normalise clearance rate across divisions
    var vals = gj.features.map(function(f){ return f.properties.clearance||0; });
    var mn = Math.min.apply(null,vals), mx = Math.max.apply(null,vals);
    gj.features.forEach(function(f){
      f.properties._clrNorm = (f.properties.clearance - mn) / (mx - mn || 1);
    });

    geoLayer = L.geoJSON(gj, {
      style: featureStyle,
      onEachFeature: function(feat, layer) {
        var p = feat.properties;
        var clrCol = p.clearance >= 20 ? '#3ecf8e' : p.clearance >= 12 ? '#e0c066' : '#e05252';
        var html =
          '<div class="div-name">' +
            '<span class="div-dot" style="background:'+lerp(p.norm,S_CRIMES)+'"></span>' +
            p.name +
          '</div>' +
          '<div class="div-rank">Rank <span class="rn">#'+p.rank+'</span> / 21</div>' +
          '<div class="stat-row"><span class="stat-label">Total Crimes</span>' +
            '<span class="stat-val" style="color:#4f8ef7">'+(p.total_crimes||0).toLocaleString()+'</span></div>' +
          '<div class="stat-row"><span class="stat-label">Clearance Rate</span>' +
            '<span class="stat-val" style="color:'+clrCol+'">'+((p.clearance||0).toFixed(1))+'%</span></div>' +
          '<div class="stat-sep"></div>' +
          '<div class="stat-row"><span class="stat-label">Top Category</span>' +
            '<span class="stat-val" style="color:var(--muted);font-size:11px">'+(p.top_category||'—')+'</span></div>' +
          '<div class="mini-bar-bg"><div class="mini-bar-fill" style="width:'+(p.norm*100)+'%;background:'+lerp(p.norm,S_CRIMES)+'"></div></div>';

        layer.bindPopup(html, {maxWidth:270, closeButton:true});
        layer.bindTooltip(p.name, {permanent:true, direction:'center', className:'div-lab', opacity:1});

        layer.on({
          mouseover: function(e) {
            e.target.setStyle({fillOpacity:0.88, weight:2.5, color:'#4f8ef7'});
            e.target.bringToFront();
          },
          mouseout:  function(e){ geoLayer.resetStyle(e.target); },
          click:     function(){ document.getElementById('hint').style.display='none'; }
        });
      }
    }).addTo(map);
  })
  .catch(function(e){ console.error('GeoJSON error:',e); });

// ── Neighborhood boundary overlay ─────────────────────────────────────────
var nbLayer = null, nbVisible = true;   // default ON

function nbStyle() {
  return {
    fillOpacity: 0,
    color: '#4f8ef7',
    opacity: dark ? 0.28 : 0.22,
    weight: 0.9,
    dashArray: '4 3',
  };
}

function loadNbLayer(cb) {
  if (nbLayer) { cb && cb(); return; }
  fetch('/data/neighborhood_crimes.geojson')
    .then(function(r){ return r.json(); })
    .then(function(gj){
      nbLayer = L.geoJSON(gj, {
        style: nbStyle,
        interactive: false,
      });
      cb && cb();
    })
    .catch(function(e){ console.warn('Neighborhood overlay error:', e); });
}

// Auto-load neighborhood overlay on startup (default ON)
(function() {
  var btn = document.getElementById('nb-btn');
  btn.classList.add('on');
  loadNbLayer(function(){ nbLayer && nbLayer.addTo(map); });
})();

document.getElementById('nb-btn').addEventListener('click', function() {
  nbVisible = !nbVisible;
  this.classList.toggle('on', nbVisible);
  if (nbVisible) {
    loadNbLayer(function(){ nbLayer && nbLayer.addTo(map); });
  } else {
    if (nbLayer) map.removeLayer(nbLayer);
  }
});

// Update overlay opacity on theme switch
document.getElementById('tt').addEventListener('click', function() {
  if (nbLayer && nbVisible) {
    nbLayer.setStyle(nbStyle());
  }
});

// ── Hour animation ──────────────────────────────────────────────────────────
var HOUR_LABELS = [
  '12 AM','1 AM','2 AM','3 AM','4 AM','5 AM','6 AM','7 AM',
  '8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM',
  '4 PM','5 PM','6 PM','7 PM','8 PM','9 PM','10 PM','11 PM'
];

function buildSparkline() {
  var spark = document.getElementById('hc-spark');
  spark.innerHTML = '';
  var maxF = maxHourFrac;
  for (var h = 0; h < 24; h++) {
    var bar = document.createElement('div');
    bar.className = 'hc-bar' + (h === currentHour ? ' hc-act' : '');
    bar.id = 'hc-b' + h;
    bar.style.height = Math.max(3, Math.round((hourFractions[h] / maxF) * 100)) + '%';
    spark.appendChild(bar);
  }
}

function updateSparkline() {
  for (var h = 0; h < 24; h++) {
    var bar = document.getElementById('hc-b' + h);
    if (bar) {
      if (h === currentHour) bar.classList.add('hc-act');
      else                   bar.classList.remove('hc-act');
    }
  }
}

function updateHourLabel() {
  var el = document.getElementById('hc-label');
  if (currentHour === null) {
    el.innerHTML = 'All Hours<small>5-year total</small>';
  } else {
    var pct = (hourFractions[currentHour] * 100).toFixed(1);
    el.innerHTML = HOUR_LABELS[currentHour] + '<small>' + pct + '% of daily crime</small>';
  }
}

function setHour(h) {
  currentHour = h;
  document.getElementById('hour-slider').value = h;
  updateSparkline();
  updateHourLabel();
  refreshStyle();
  document.getElementById('hour-reset').style.display = 'flex';
}

function resetHour() {
  stopPlay();
  currentHour = null;
  document.getElementById('hour-slider').value = 6;
  updateSparkline();
  updateHourLabel();
  refreshStyle();
  document.getElementById('hour-reset').style.display = 'none';
}

function stopPlay() {
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
  isPlaying = false;
  var btn = document.getElementById('play-btn');
  btn.textContent = '▶';
  btn.classList.remove('playing');
  btn.title = 'Play 24h animation';
}

document.getElementById('play-btn').addEventListener('click', function() {
  if (isPlaying) {
    stopPlay();
  } else {
    isPlaying = true;
    this.textContent = '⏸';
    this.classList.add('playing');
    this.title = 'Pause animation';
    if (currentHour === null) currentHour = 0;
    playInterval = setInterval(function() {
      setHour((currentHour + 1) % 24);
    }, 300);
  }
});

document.getElementById('hour-slider').addEventListener('input', function() {
  if (isPlaying) stopPlay();  // manual drag stops auto-play
  setHour(parseInt(this.value, 10));
});

document.getElementById('hour-reset').addEventListener('click', resetHour);

// Pause animation when switching to clearance rate
document.querySelectorAll('.mb').forEach(function(btn) {
  btn.addEventListener('click', function() { if (isPlaying) stopPlay(); });
});

// Load hourly city-wide data → compute fractions → enable controls
fetch('/data/hourly_dow.json')
  .then(function(r) { return r.json(); })
  .then(function(rows) {
    var totals = new Array(24).fill(0);
    for (var i = 0; i < rows.length; i++) {
      totals[rows[i].hour] = (totals[rows[i].hour] || 0) + rows[i].crimes;
    }
    var grand = totals.reduce(function(a, b) { return a + b; }, 0);
    hourFractions = totals.map(function(v) { return v / grand; });
    maxHourFrac = Math.max.apply(null, hourFractions);

    // Enable controls
    document.getElementById('play-btn').disabled   = false;
    document.getElementById('hour-slider').disabled = false;

    buildSparkline();
    updateHourLabel();
    document.getElementById('hc-label').innerHTML =
      'All Hours<small>drag or press play</small>';
  })
  .catch(function() {
    document.getElementById('hc-label').innerHTML = 'Hourly data<small>unavailable</small>';
  });
</script>
</body>
</html>
